<!DOCTYPE html>
<html>
    <head>
        <title>simple calculator</title>
        <style>
            body{
            font-family: Arial;
            padding: 30px;
        }

        input, select, button{
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }

        </style>
    </head>
        
        
        <body>
            <form onsubmit="return false;">
        <input type="text" id ="number1" placeholder="Enter first number">
        <input type="text" id ="number2" placeholder="Enter second number">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <button type="button" onclick="PerformArithematicOperation()">
            Calculate
        </button>
    </form>
    <div id="result"></div>
    
    <script> 
    function PerformArithematicOperation(){
        const number1= parseFloat(document.getElementById("number1").value);
        const number2= parseFloat(document.getElementById("number2").value);
    const operator=document.getElementById("operator").value;
    
    if (isNaN(number1)||isNaN(number2)){
        result="enter number";
        return;
    }

    switch(operator){
        case "+":
            result = number1 + number2;
            break;

            case "-":
            result = number1 - number2;
            break;

            case "*":
                result = number1 * number2;
            break;
            
            case "/":
                if(number2 ==0){
                    result="divide by zero error";
                    
                } else{
                    result =  number1 / number2;
                }
            break;

    }

    const resultDiv=document.getElementById("result").innerHTML = "Result:"+ result;
}

</script>

</body>
</html>
